<!doctype html>
<html lang="fa" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css"/>

    <!-- اضافه کردن Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body >
<header>
    <nav>
        <!-- bardia -->
    </nav>
</header>
<main>
    <section id="welcome">
        <!-- bardia -->
    </section>
    <section id="today-tasks">
        <!-- amin -->
    </section>
    <section id="done-tasks" class="mt-10 px-4">

        <!-- عنوان -->
        <div class="mb-5">
            <h2 class="text-2xl font-bold text-[var(--color-on-background-light)] dark:text-[var(--color-on-background-dark)]">
                تسک‌های انجام شده
            </h2>

            <p class="mt-1 text-sm text-[var(--color-neutral-4)] dark:text-[var(--color-neutral-5)]">
                ۳ تسک انجام شده است
            </p>
        </div>

        <!-- لیست کارت‌ها -->
        <div class="flex flex-col gap-4">

            <!-- کارت اول -->
            <div class="relative flex w-full items-center gap-5 overflow-hidden rounded-2xl bg-[var(--color-surface-light)] dark:bg-[var(--color-surface-dark)] px-6 py-7 shadow-md">

                <div class="absolute right-0 top-4 bottom-4 w-1.5 rounded-l-full bg-orange-500"></div>

                <input
                        type="checkbox"
                        checked
                        class="h-5 w-5 cursor-pointer accent-blue-600"
                >

                <div class="flex-1 text-base leading-relaxed line-through opacity-60 text-[var(--color-on-background-light)] dark:text-[var(--color-on-background-dark)]">
                    خرید میوه و سبزیجات و لبنیات برای خانه
                </div>

                <i class="fa-solid fa-ellipsis-vertical text-xl text-[var(--color-neutral-4)] dark:text-[var(--color-neutral-5)]"></i>
            </div>

            <!-- کارت دوم -->
            <div class="relative flex w-full items-center gap-5 overflow-hidden rounded-2xl bg-[var(--color-surface-light)] dark:bg-[var(--color-surface-dark)] px-6 py-7 shadow-md">

                <div class="absolute right-0 top-4 bottom-4 w-1.5 rounded-l-full bg-red-500"></div>

                <input
                        type="checkbox"
                        checked
                        class="h-5 w-5 cursor-pointer accent-blue-600"
                >

                <div class="flex-1 text-base leading-relaxed line-through opacity-60 text-[var(--color-on-background-light)] dark:text-[var(--color-on-background-dark)]">
                    تماس با مبل‌فروشی در مورد تأخیر در ارسال
                </div>

                <i class="fa-solid fa-ellipsis-vertical text-xl text-[var(--color-neutral-4)] dark:text-[var(--color-neutral-5)]"></i>
            </div>

            <!-- کارت سوم -->
            <div class="relative flex w-full items-center gap-5 overflow-hidden rounded-2xl bg-[var(--color-surface-light)] dark:bg-[var(--color-surface-dark)] px-6 py-7 shadow-md">

                <div class="absolute right-0 top-4 bottom-4 w-1.5 rounded-l-full bg-orange-500"></div>

                <input
                        type="checkbox"
                        checked
                        class="h-5 w-5 cursor-pointer accent-blue-600"
                >

                <div class="flex-1 text-base leading-relaxed line-through opacity-60 text-[var(--color-on-background-light)] dark:text-[var(--color-on-background-dark)]">
                    جلسه با مرتضی در مورد مصاحبه با کارآموز ادمین پنل
                </div>

                <i class="fa-solid fa-ellipsis-vertical text-xl text-[var(--color-neutral-4)] dark:text-[var(--color-neutral-5)]"></i>
            </div>
        </div>
<!--test-->
    </section>
</main>

<script src="./src/main.js"></script>
</body>
</html>
